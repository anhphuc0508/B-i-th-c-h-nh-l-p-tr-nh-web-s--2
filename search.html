<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LapDesk - Kết quả tìm kiếm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            padding-top: 180px;
            background-color: #F4F6F8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1) !important;
            transition: 0.3s;
        }
    </style>
</head>

<body>
    <div id="header-container"></div>

    <main class="container mt-5 mb-5" style="min-height: 50vh;">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Trang chủ</a></li>
                <li class="breadcrumb-item active" aria-current="page">Tìm kiếm</li>
            </ol>
        </nav>

        <h2 class="mb-4 fw-bold text-primary border-bottom pb-2">
            Kết quả tìm kiếm cho: <span id="tu-khoa" class="text-danger"></span>
        </h2>
        
        <div id="render-ket-qua" class="row g-4 mb-5"></div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="ProductRender.js"></script>
    <script src="HFshow.js"></script>

    <script>
      
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('query');
        
        if (query) {
            document.getElementById('tu-khoa').innerText = '"' + query + '"';
            const keyword = query.toLowerCase().trim(); 
            
          
            const ketQua = tatCaSanPham.filter(item => 
                item.name.toLowerCase().includes(keyword) || 
                item.brand.toLowerCase().includes(keyword) ||
                item.type.toLowerCase().includes(keyword)
            );
            
            const roChua = document.getElementById('render-ket-qua');
            let htmlContent = "";
       
            if (ketQua.length === 0) {
                roChua.innerHTML = `
                <div class="col-12 text-center py-5">
                    <h4 class="text-muted mb-3">Rất tiếc, không tìm thấy sản phẩm nào phù hợp!</h4>
                    <a href="index.html" class="btn btn-outline-primary">Quay lại Trang chủ</a>
                </div>`;
            } else {

                ketQua.forEach(item => {
                    htmlContent += `
                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="card h-100 product-card shadow-sm border-0">
                            <a href="product.html?id=${item.id}">
                                <img src="${item.img}" class="card-img-top p-3" alt="${item.name}" style="height: 200px; object-fit: contain;">
                            </a>
                            <div class="card-body d-flex flex-column">
                                <a href="product.html?id=${item.id}" class="text-decoration-none text-dark">
                                    <h5 class="card-title text-truncate" title="${item.name}">${item.name}</h5>
                                </a>
                                <p class="card-text text-danger fw-bold">${item.price}</p>
                                <button class="btn btn-outline-primary mt-auto" onclick="themSanPham('${item.id}')">
                                    <i class="bi bi-cart-plus"></i> Thêm vào giỏ
                                </button>
                            </div>
                        </div>
                    </div>
                    `;
                });
                roChua.innerHTML = htmlContent;
            }
        } else {

            document.getElementById('tu-khoa').innerText = '...';
            document.getElementById('render-ket-qua').innerHTML = '<p class="text-center py-5">Vui lòng nhập từ khóa trên thanh tìm kiếm.</p>';
        }
    </script>
</body>
</html>
