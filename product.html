<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LapDesk - Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            padding-top: 180px;
            background-color: #F4F6F8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }


        #detail-name {
            font-size: 1.8rem;
            color: #212529;
            margin-bottom: 10px;
        }

        #detail-price {
            color: #d70018;
            /* Màu đỏ đặc trưng của các shop công nghệ */
            font-size: 2.5rem;
            font-weight: 800;
            margin-right: 15px;
            line-height: 1;
        }

        .old-price {
            font-size: 1.2rem;
            color: #707070;
            text-decoration: line-through;
            font-weight: 400;
        }

        .vat-text {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 5px;
        }

        .btn-add-to-cart {
            background-color: #007bff;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .btn-add-to-cart:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
        }


        .navbar {
            border-bottom: none;
            gap: 15px;
        }

        .nav-login-btn:hover {
            background-color: #ffffff;
            color: #1E90FF !important;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="header-container"></div>

    <main class="container mt-5 mb-5">
        <div class="row">
            <div class="col-lg-9  mb-4">
                <div class="row bg-white p-4 rounded-4 shadow-sm border">
                    <div class="col-md-5 mb-4 mb-md-0">
                        <div class="border rounded-4 overflow-hidden shadow-sm">
                            <img id="detail-img" src="" class="img-fluid w-100" alt="Ảnh sản phẩm">
                        </div>
                    </div>

                    <div class="col-md-7 ps-md-5">
                        <nav aria-label="breadcrumb" class="mb-2">
                            <ol class="breadcrumb small">
                                <li class="breadcrumb-item"><a href="index.html">Trang chủ</a></li>
                                <li class="breadcrumb-item active" aria-current="page">Laptop</li>
                            </ol>
                        </nav>

                        <h2 id="detail-name" class="fw-bold text-uppercase">Đang tải...</h2>

                        <div class="price-section my-4 py-3 border-top border-bottom">
                            <div class="d-flex align-items-baseline">
                                <span id="detail-price"></span>
                                <del id="detail-old-price" class="old-price"></del>
                            </div>
                            <p class="vat-text"><i class="bi bi-check-circle-fill text-success"></i> Đã bao gồm thuế VAT
                            </p>
                        </div>

                        <p id="detail-desc" class="text-secondary mb-4" style="line-height: 1.6;"></p>

                        <div class="d-flex align-items-center mb-4 gap-3">
                            <span id="soluong" class="fw-bold">Chọn số lượng:</span>
                            <input type="number" class="form-control text-center shadow-sm" id="input-soluong" value="1"
                                min="1" style="width: 80px; border-radius: 8px;">
                        </div>

                        <div class="d-grid gap-2 d-md-block">
                            <button id="btn-them-chinh" class="btn btn-primary btn-lg btn-add-to-cart shadow">
                                <i class="bi bi-cart-plus-fill me-2"></i>Thêm vào giỏ hàng
                            </button>
                        </div>

                        <div class="row g-3 mt-4">
                            <div class="col-6">
                                <div class="policy-badge d-flex align-items-center gap-2">
                                    <i class="bi bi-truck fs-4 text-primary"></i>
                                    <span class="small">Giao hàng miễn phí toàn quốc</span>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="policy-badge d-flex align-items-center gap-2">
                                    <i class="bi bi-shield-check fs-4 text-success"></i>
                                    <span class="small">Bảo hành chính hãng 12 tháng</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row bg-white p-4 rounded-4 shadow-sm mt-4 border">
                    <h4 class="fw-bold mb-4 border-bottom pb-2 text-primary">
                        <i class="bi bi-cpu me-2"></i>Thông số kỹ thuật chi tiết
                    </h4>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <tbody id="detail-specs">
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="mt-5 pt-4 border-top">
                    <h3 class="fw-bold mb-4">Sản phẩm tương tự</h3>
                    <div id="render-de-xuat" class="row g-4 mb-4"></div>
                </div>
            </div>
            <div class="col-lg-3">
                <div class="card shadow-sm border-0 rounded-4  bg-white">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3 text-center text-primary">CẦN TƯ VẤN THÊM?</h6>
                        <p class="small text-center text-muted mb-3">Để lại số điện thoại, LapDesk sẽ gọi lại cho
                            bạn ngay!</p>

                        <form id="form-tu-van">
                            <div class="mb-3">
                                <input type="text" class="form-control form-control-sm shadow-none" id="tuvan-name"
                                    placeholder="Nhập tên của bạn *" required>
                            </div>

                            <div class="mb-3">
                                <input type="tel" class="form-control form-control-sm shadow-none" id="tuvan-phone"
                                    placeholder="Nhập số điện thoại *" required>
                            </div>

                            <div class="mb-3">
                                <textarea class="form-control form-control-sm shadow-none" id="tuvan-note" rows="2"
                                    placeholder="Bạn cần hỏi thêm gì? (Không bắt buộc)"></textarea>
                            </div>

                            <button type="button" class="btn btn-danger w-100 fw-bold" onclick="guiTuVan()">
                                <i class="bi bi-send me-1"></i> GỬI YÊU CẦU
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const sanpham = tatCaSanPham.find(sp => sp.id === productId);

        if (sanpham) {
            document.getElementById('detail-name').innerText = sanpham.name;
            document.getElementById('detail-img').src = sanpham.img;
            document.getElementById('detail-price').innerText = sanpham.price;

            let codeHtmlBang = "";
            const khungBang = document.getElementById('detail-specs');
            document.getElementById('btn-them-chinh').onclick = function () {
                const soLuongChon = document.getElementById('input-soluong').value;

                themSanPham(sanpham.id, soLuongChon);
            };
            if (sanpham.specs) {
                for (const [key, value] of Object.entries(sanpham.specs)) {
                    codeHtmlBang += `
                    <tr>
                        <th class="w-25 text-secondary bg-light ps-3">${key}</th>
                        <td class="fw-bold ps-3">${value}</td>
                    </tr>`;
                }
            }
            khungBang.innerHTML = codeHtmlBang;

        } else {
            document.querySelector('main').innerHTML = `
                <div class="container text-center py-5">
                    <h2 class="text-danger">Oops! Không tìm thấy sản phẩm.</h2>
                    <a href="index.html" class="btn btn-primary mt-3">Quay lại trang chủ</a>
                </div>`;
        }
        const roDeXuat = document.getElementById('render-de-xuat');
        if (roDeXuat) {
            let htmlDeXuat = "";
            const dsDeXuat = tatCaSanPham
                .filter(item => item.type === sanpham.type && item.id !== sanpham.id)
                .slice(0, 8);

            if (dsDeXuat.length === 0) {
                roDeXuat.innerHTML = '<p class="text-muted small">Đang cập nhật sản phẩm tương tự...</p>';
            } else {
                dsDeXuat.forEach(item => {
                    htmlDeXuat += `
                        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                            <div class="card h-100 product-card border-0 shadow-sm">
                                <a href="product.html?id=${item.id}">
                                    <img src="${item.img}" class="card-img-top" alt="${item.name}" style="height: 180px; object-fit: contain; padding: 15px;">
                                </a>
                                <div class="card-body d-flex flex-column p-3">
                                    <a href="product.html?id=${item.id}" class="text-decoration-none text-dark">
                                        <h6 class="card-title fw-semibold text-truncate" title="${item.name}">${item.name}</h6>
                                    </a>
                                    <p class="card-text text-danger fw-bold mb-2">${item.price}</p>
                                    <button class="btn btn-outline-primary btn-sm mt-auto" onclick="themSanPham('${item.id}')">
                                        <i class="bi bi-cart-plus"></i> Thêm vào giỏ
                                    </button>
                                </div>
                            </div>
                        </div>
                        `;
                });
                roDeXuat.innerHTML = htmlDeXuat;
            }
        }
    </script>
    <script src="data.js"></script>
    <script src="HFshow.js"></script>
    <script src="ProductRender.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
