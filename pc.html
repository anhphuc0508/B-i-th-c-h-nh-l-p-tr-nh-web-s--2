<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LapDesk - Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            padding-top: 180px;
            background-color: #F4F6F8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            border-bottom: none;
            gap: 15px;
        }

        .nav-login-btn:hover {
            background-color: #ffffff;
            color: #1E90FF !important;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="header-container"></div>

    <main class="container mt-5 mb-5" style="min-height: 50vh;">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Trang chủ</a></li>
                <li class="breadcrumb-item active" aria-current="page">PC</li>
            </ol>
        </nav>
        <h2 class="mb-4 fw-bold text-primary border-bottom pb-2">Danh Mục PC</h2>
        <div id="render-pc" class="row g-4 mb-5"></div>
        <nav aria-label="Page navigation">
            <ul id="thanh-phan-trang" class="pagination justify-content-center mt-4">
            </ul>
        </nav>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="ProductRender.js"></script>
    <script src="HFshow.js"></script>
    <script>
        let trangHienTai = 1;
        const soSanPhamMoiTrang = 8; 
        
    
        const danhSachLaptop = tatCaSanPham.filter(item => item.type === 'pc');

       
        function hienThiLaptopCoPhanTrang(trang) {
            trangHienTai = trang;
            const viTriBatDau = (trangHienTai - 1) * soSanPhamMoiTrang;
            const viTriKetThuc = viTriBatDau + soSanPhamMoiTrang;
            
            const laptopTrenTrang = danhSachLaptop.slice(viTriBatDau, viTriKetThuc);

            let htmlSanPham = "";
            const roChua = document.getElementById('render-pc');
            
            laptopTrenTrang.forEach((item) => {
                htmlSanPham += `
                <div class="col-12 col-md-6 col-lg-3">
                    <div class="card h-100 product-card shadow-sm border-0">
                        <a href="product.html?id=${item.id}">
                            <img src="${item.img}" class="card-img-top p-3" alt="${item.name}" style="height: 200px; object-fit: contain;">
                        </a>
                        <div class="card-body d-flex flex-column">
                            <a href="product.html?id=${item.id}" class="text-decoration-none text-dark">
                                <h5 class="card-title text-truncate" title="${item.name}">${item.name}</h5>
                            </a>
                            <p class="card-text text-danger fw-bold">${item.price}</p>
                            <p class="card-text small text-muted mb-3" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 40px;">
                                ${item.desc}
                            </p>
                            <button class="btn btn-outline-primary mt-auto" onclick="themSanPham('${item.id}')">
                                <i class="bi bi-cart-plus"></i> Thêm vào giỏ
                            </button>
                        </div>
                    </div>
                </div>
                `;
            });
            roChua.innerHTML = htmlSanPham;

      
            const tongSoTrang = Math.ceil(danhSachLaptop.length / soSanPhamMoiTrang);
            let htmlPhanTrang = "";
            const thanhPhanTrang = document.getElementById('thanh-phan-trang');

         
            htmlPhanTrang += `
                <li class="page-item ${trangHienTai === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="hienThiLaptopCoPhanTrang(${trangHienTai - 1}); return false;">Trang trước</a>
                </li>
            `;

           
            for (let i = 1; i <= tongSoTrang; i++) {
       
                htmlPhanTrang += `
                    <li class="page-item ${i === trangHienTai ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="hienThiLaptopCoPhanTrang(${i}); return false;">${i}</a>
                    </li>
                `;
            }

        
            htmlPhanTrang += `
                <li class="page-item ${trangHienTai === tongSoTrang ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="hienThiLaptopCoPhanTrang(${trangHienTai + 1}); return false;">Trang sau</a>
                </li>
            `;

            thanhPhanTrang.innerHTML = htmlPhanTrang;
        }
        hienThiLaptopCoPhanTrang(1);
        </script>
</body>
</html>
