<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LapDesk - Giỏ Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            padding-top: 180px;
            background-color: #F4F6F8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tỉa lại phần tên và giá cho sang */
        #detail-name {
            font-size: 1.8rem;
            color: #212529;
            margin-bottom: 10px;
        }

        #detail-price {
            color: #d70018;
            /* Màu đỏ đặc trưng của các shop công nghệ */
            font-size: 2.5rem;
            font-weight: 800;
            margin-right: 15px;
            line-height: 1;
        }

        .old-price {
            font-size: 1.2rem;
            color: #707070;
            text-decoration: line-through;
            font-weight: 400;
        }

        .vat-text {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 5px;
        }

        .btn-add-to-cart {
            background-color: #007bff;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .btn-add-to-cart:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
        }

        .policy-badge {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.9rem;
            border: 1px solid #e9ecef;
        }

        .navbar {
            border-bottom: none;
            gap: 15px;
        }

        .nav-login-btn:hover {
            background-color: #ffffff;
            color: #1E90FF !important;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="header-container"></div>
    <main class="container mt-5 mb-5" style="min-height: 50vh;">
        <h2 class="mb-4 border-bottom pb-2 fw-bold text-primary">Giỏ hàng của bạn</h2>
        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th scope="col">Sản phẩm</th>
                                        <th scope="col">Đơn giá</th>
                                        <th scope="col">Số lượng</th>
                                        <th scope="col">Thành tiền</th>
                                        <th scope="col"></th>
                                    </tr>
                                </thead>
                                <tbody id="bang-gio-hang">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm border-0 bg-white">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">Đơn hàng</h5>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Tạm tính:</span>
                            <span id="tam-tinh" class="fw-bold">0 đ</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 border-bottom pb-3">
                            <span>Phí giao hàng:</span>
                            <span class="text-success">Miễn phí</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold fs-5">Tổng cộng:</span>
                            <span id="tong-tien" class="fw-bold fs-5 text-danger">0 đ</span>
                        </div>
                        <a href="checkout.html">
                            <button class="btn btn-primary w-100 btn-lg shadow-sm">Tiến hành thanh toán</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function convertPriceToNumber(priceStr) {
            return Number(priceStr.replace(/[^0-9]/g, ''));
        }
        function formatNumberToPrice(number) {
            return number.toLocaleString('vi-VN') + ' đ';
        }

        function hienThiGioHang() {
            let gioHang = JSON.parse(localStorage.getItem('gioHang')) || [];
            const bangGioHang = document.getElementById('bang-gio-hang');
            let htmlContent = "";
            let tongTien = 0;

            if (gioHang.length === 0) {
                bangGioHang.innerHTML = `<tr><td colspan="5" class="text-center py-4">Giỏ hàng đang trống. <a href="index.html">Tiếp tục mua sắm</a></td></tr>`;
                document.getElementById('tam-tinh').innerText = "0 đ";
                document.getElementById('tong-tien').innerText = "0 đ";
                document.getElementById('cart-count').innerText = "0";
                return;
            }

            gioHang.forEach((sp, index) => {
                let giaSo = convertPriceToNumber(sp.price);
                let thanhTien = giaSo * sp.soLuong;
                tongTien += thanhTien;

                htmlContent += `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <img src="${sp.img}" width="60" class="rounded me-3 object-fit-cover" alt="${sp.name}">
                            <a href="product.html?id=${sp.id}" class="text-decoration-none text-dark fw-semibold">${sp.name}</a>
                        </div>
                    </td>
                    <td>${sp.price}</td>
                    <td>
                        <span class="badge bg-light text-dark border fs-6 px-3 py-2">${sp.soLuong}</span>
                    </td>
                    <td class="text-danger fw-bold">${formatNumberToPrice(thanhTien)}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="xoaSanPham(${index})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                `;
            });

            bangGioHang.innerHTML = htmlContent;
            document.getElementById('tam-tinh').innerText = formatNumberToPrice(tongTien);
            document.getElementById('tong-tien').innerText = formatNumberToPrice(tongTien);


            let tongSoLuong = gioHang.reduce((tong, sp) => tong + sp.soLuong, 0);
            let hienThiSoLuong = document.getElementById('cart-count');


            if (hienThiSoLuong) {
                hienThiSoLuong.innerText = tongSoLuong;
            }
        }

        function xoaSanPham(index) {
            let gioHang = JSON.parse(localStorage.getItem('gioHang')) || [];
            gioHang.splice(index, 1);
            localStorage.setItem('gioHang', JSON.stringify(gioHang));
            hienThiGioHang();
        }
        const khachHangHienTai = JSON.parse(localStorage.getItem('userHienTai'));

        if (!khachHangHienTai) {
            alert("Bạn cần đăng nhập để xem giỏ hàng và tiến hành thanh toán!");
            window.location.href = "index.html";
        } else {
            hienThiGioHang();
        }
        function capNhatSoLuongGioHang() {
            let gioHang = JSON.parse(localStorage.getItem('gioHang')) || [];
            let tongSoLuong = gioHang.reduce((tong, sp) => tong + sp.soLuong, 0);
            let hienThiSoLuong = document.getElementById('cart-count');
            if (hienThiSoLuong) {
                hienThiSoLuong.innerText = tongSoLuong;
            }
        }
    </script>
    <script src="HFshow.js"></script>
    <div id="footer-container"></div>

</body>
